services:
  - type: web
    name: clinsync-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements-prod.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: clinsync-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: DEEPGRAM_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: USE_KAFKA
        value: "false"
      - key: HAPI_FHIR_URL
        value: https://hapi.fhir.org/baseR4
      - key: CORS_ORIGINS
        value: '["https://clinsync-frontend.onrender.com"]'
      - key: LANGCHAIN_TRACING_V2
        value: "false"
      - key: LANGSMITH_TRACING
        value: "false"

  - type: web
    name: clinsync-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://clinsync-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: clinsync-db
    region: oregon
    plan: free
    databaseName: clinsync_db
    user: clinsync